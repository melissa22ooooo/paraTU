<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Pío Pío 🐥❤️</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family: 'Georgia', serif;
    color:white;
}

/* Fondo pollitos */
.background{
    position:fixed;
    width:100%;
    height:100%;
    background:url("https://i.imgur.com/7b1G6QG.png");
    background-size:200px;
    opacity:0.15;
    animation:moveBg 25s linear infinite;
    z-index:-2;
}

@keyframes moveBg{
    from{background-position:0 0;}
    to{background-position:400px 400px;}
}

/* Corazones */
.heart{
    position:absolute;
    color:#ff4d6d;
    font-size:20px;
    animation:floatUp linear infinite;
}
@keyframes floatUp{
    from{transform:translateY(100vh);opacity:1;}
    to{transform:translateY(-10vh);opacity:0;}
}

/* Slides texto */
.slide{
    position:absolute;
    width:100%;
    top:40%;
    text-align:center;
    opacity:0;
    padding:0 20px;
    animation:fade 8s infinite;
}

@keyframes fade{
    0%{opacity:0;}
    20%{opacity:1;}
    80%{opacity:1;}
    100%{opacity:0;}
}

.slide:nth-child(1){animation-delay:0s;}
.slide:nth-child(2){animation-delay:8s;}
.slide:nth-child(3){animation-delay:16s;}
.slide:nth-child(4){animation-delay:24s;}
.slide:nth-child(5){animation-delay:32s;}
.slide:nth-child(6){animation-delay:40s;}
.slide:nth-child(7){animation-delay:48s;}

/* Foto final */
.final-photo{
    position:absolute;
    top:20%;
    width:100%;
    text-align:center;
    opacity:0;
    animation:showFinal 8s forwards;
    animation-delay:56s;
}

.final-photo img{
    max-width:80%;
    border-radius:15px;
    box-shadow:0 0 25px rgba(255,255,255,0.4);
}

@keyframes showFinal{
    from{opacity:0;}
    to{opacity:1;}
}

/* Texto final */
.final-text{
    position:absolute;
    width:100%;
    top:75%;
    text-align:center;
    font-size:2em;
    opacity:0;
    animation:showFinal 6s forwards;
    animation-delay:60s;
}

/* Carta cerrándose */
.letter{
    position:fixed;
    bottom:-100%;
    left:0;
    width:100%;
    height:100%;
    background:white;
    z-index:5;
    animation:closeLetter 4s forwards;
    animation-delay:66s;
}

@keyframes closeLetter{
    from{bottom:-100%;}
    to{bottom:0;}
}

/* Video oculto */
#player{
    position:absolute;
    width:1px;
    height:1px;
    left:-9999px;
}
</style>
</head>

<body>

<div class="background"></div>

<div class="slide"><h1>6 de Enero 🖤</h1></div>
<div class="slide"><h1>Todo empezó con un mensaje… y hablamos hasta las 3am.</h1></div>
<div class="slide"><h1>Desde entonces, despierto esperando tu mensaje.</h1></div>
<div class="slide"><h1>Entre llamadas y videollamadas…</h1></div>
<div class="slide"><h1>Descubrí que mi parte favorita es tu risa.</h1></div>
<div class="slide"><h1>Cuando te ríes, yo también sonrío.</h1></div>
<div class="slide"><h1>El primer abrazo… la emoción sigue aquí.</h1></div>

<div class="final-photo">
    <img src="abrazo.jpg" alt="Nuestro abrazo">
</div>

<div class="final-text">
    Pío Pío 🐥❤️
</div>

<div class="letter"></div>

<div id="player"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
function onYouTubeIframeAPIReady(){
    new YT.Player('player',{
        videoId:'JwAS9f_b8Js',
        playerVars:{
            autoplay:1,
            loop:1,
            playlist:'JwAS9f_b8Js',
            controls:0
        },
        events:{
            onReady:function(event){
                event.target.setVolume(50);
                event.target.playVideo();
            }
        }
    });
}

/* Corazones flotando */
function createHeart(){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(3+Math.random()*5)+"s";
    document.body.appendChild(heart);
    setTimeout(()=>{heart.remove();},8000);
}
setInterval(createHeart,500);
</script>

</body>
</html>
