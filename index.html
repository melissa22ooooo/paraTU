<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Pío Pío 🖤</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:'Georgia',serif;
    color:white;
    text-align:center;
}

/* Pantalla inicial */
.start-screen{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:10;
}

.start-btn{
    padding:15px 30px;
    font-size:1.2em;
    background:white;
    color:black;
    border:none;
    border-radius:30px;
    cursor:pointer;
    transition:0.3s;
}

.start-btn:hover{
    background:#ff4d6d;
    color:white;
}

/* Contador */
.counter{
    position:absolute;
    top:8%;
    width:100%;
    font-size:1.05em;
}

.counter span{
    font-size:1.4em;
    color:#ff4d6d;
}

/* Slides */
.slide{
    position:absolute;
    width:100%;
    top:40%;
    opacity:0;
    padding:0 20px;
}

.fade{
    animation:fade 8s forwards;
}

@keyframes fade{
    0%{opacity:0;}
    20%{opacity:1;}
    80%{opacity:1;}
    100%{opacity:0;}
}

/* Fotos */
.photo{
    position:absolute;
    width:100%;
    text-align:center;
    opacity:0;
}

.photo img{
    max-width:85%;
    border-radius:15px;
    box-shadow:0 0 25px rgba(255,255,255,0.4);
}

#fotoEl{
    top:25%;
}

#fotoAbrazo{
    top:25%;
}

.final-text{
    position:absolute;
    width:100%;
    top:75%;
    font-size:2em;
    opacity:0;
}

/* Pollitos y corazones */
.chick, .heart{
    position:absolute;
    font-size:22px;
    animation:float linear infinite;
}

@keyframes float{
    from{transform:translateY(100vh);opacity:1;}
    to{transform:translateY(-10vh);opacity:0;}
}

/* Video oculto */
#player{
    position:absolute;
    width:1px;
    height:1px;
    left:-9999px;
}
</style>
</head>

<body>

<div class="start-screen" id="startScreen">
    <h2>Para ti 🖤</h2>
    <button class="start-btn" onclick="startExperience()">Empieza nuestra historia 🖤</button>
</div>

<div id="content" style="display:none;">

<div class="counter" id="counter"></div>

<div class="slide" id="s1">6 de Enero 🖤</div>
<div class="slide" id="s2">Todo empezó con un mensaje… y hablamos hasta las 3am.</div>
<div class="slide" id="s3">Desde entonces, despierto esperando tu mensaje.</div>
<div class="slide" id="s4">Entre llamadas y videollamadas…</div>
<div class="slide" id="s5">Descubrí que mi parte favorita es tu risa.</div>

<div class="photo" id="fotoEl">
    <img src="foto-el.jpg" alt="Él">
</div>

<div class="slide" id="s6">Cuando te ríes, yo también sonrío.</div>
<div class="slide" id="s7">El primer abrazo… la emoción sigue aquí.</div>

<div class="photo" id="fotoAbrazo">
    <img src="abrazo.jpg" alt="Nuestro abrazo">
</div>

<div class="final-text" id="finalText">
    Pío Pío 🐥❤️
</div>

</div>

<div id="player"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>

let player;

function onYouTubeIframeAPIReady(){
    player = new YT.Player('player',{
        videoId:'JwAS9f_b8Js',
        playerVars:{loop:1,playlist:'JwAS9f_b8Js'}
    });
}

function startExperience(){
    document.getElementById("startScreen").style.display="none";
    document.getElementById("content").style.display="block";
    player.playVideo();
    startSlides();
    startAnimation();
    startCounter();
}

/* CONTADOR EN TIEMPO REAL */
function startCounter(){
    const startDate = new Date("2026-01-06T00:00:00");

    setInterval(()=>{
        const now = new Date();
        let diff = now - startDate;
        if(diff < 0) diff = 0;

        const days = Math.floor(diff / (1000*60*60*24));
        const hours = Math.floor((diff / (1000*60*60)) % 24);
        const minutes = Math.floor((diff / (1000*60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        document.getElementById("counter").innerHTML =
        `Llevamos <span>${days}</span> días 
        <span>${hours}</span> horas 
        <span>${minutes}</span> minutos 
        <span>${seconds}</span> segundos 
        desde aquel 6 de Enero 🖤`;
    },1000);
}

/* Slides y fotos */
function startSlides(){
    const slides=["s1","s2","s3","s4","s5","s6","s7"];
    slides.forEach((id,index)=>{
        setTimeout(()=>{
            document.getElementById(id).classList.add("fade");
        }, index*8000);
    });

    setTimeout(()=>{
        document.getElementById("fotoEl").style.opacity="1";
    },32000);

    setTimeout(()=>{
        document.getElementById("fotoEl").style.opacity="0";
    },40000);

    setTimeout(()=>{
        document.getElementById("fotoAbrazo").style.opacity="1";
    },56000);

    setTimeout(()=>{
        document.getElementById("finalText").style.opacity="1";
    },60000);
}

/* Animaciones */
function createEmoji(symbol,interval){
    setInterval(()=>{
        const el=document.createElement("div");
        el.className = symbol==="🐥" ? "chick" : "heart";
        el.innerHTML=symbol;
        el.style.left=Math.random()*100+"vw";
        el.style.animationDuration=(4+Math.random()*6)+"s";
        document.body.appendChild(el);
        setTimeout(()=>{el.remove();},10000);
    },interval);
}

function startAnimation(){
    createEmoji("🐥",800);
    createEmoji("❤",500);
}

</script>

</body>
</html>
